<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vòng quay quà tặng bbi, không nhân dịp gì cả </title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e3a8a;
      --card: rgba(15,23,42,0.9);
      --text: #e2e8f0;
      --accent: #3b82f6;
      --accent-2: #60a5fa;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: grid;
      place-items: center;
    }

    .app {
      width: 90%;
      max-width: 900px;
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
    }

    h1 { text-align: center; }

    .wheel-wrap { position: relative; width: 100%; max-width: 500px; margin: auto; }

    canvas { width: 100%; transition: transform 5s ease; }

    .pointer {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 30px solid red;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 12px 20px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #result { text-align: center; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="app">
    <h1>🎁 Món quà tiếp theo bbi, không nhân dịp gì cả 🎁 </h1>

    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button onclick="spin()">Quay</button>
    <div id="result">Bấm quay đi 😏</div>
	<div id="celebration" class="celebration hidden">
  <div class="celebration-text">🎉 Chỉ được quay 1 lần 🎉</div>
</div>

<audio id="winSound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/crowds/large_crowd_cheer.ogg" type="audio/ogg">
</audio>

<audio id="tickSound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>
  </div>

<script>
// ====== 3 QUÀ THẬT (KHÔNG HIỂN THỊ RA NGOÀI) ======
const realGifts = ["Sách Ngọt "," đàn  ","con vịt ","con gấu "];
const chosenIndexes = [5, 20, 40];
const weights = [0.34,0.33,0.33];

// ====== LOAD DANH SÁCH QUÀ TỪ FILE gifts.txt ======
let fillerPool = [];

fetch("gifts.txt")
  .then(res => res.text())
  .then(text => {
    fillerPool = text.split("\n").filter(x => x.trim() !== "");
    init();
  })
  .catch(() => {
    fillerPool = ["Quà A","Quà B","Quà C"];
    init();
  });

let wheelItems = [];
let currentRotation = 0;
let segmentAngle;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function init() {
  const segmentCount = 50;
  wheelItems = Array.from({length: segmentCount}, (_,i)=> fillerPool[i % fillerPool.length]);
  chosenIndexes.forEach((idx,i)=> wheelItems[idx]=realGifts[i]);
  segmentAngle = (Math.PI*2)/segmentCount;
  draw();
}

function draw() {
  const r = canvas.width/2;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(r,r);

  for(let i=0;i<wheelItems.length;i++){
    const start = i*segmentAngle - Math.PI/2;
    const end = start + segmentAngle;

    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r-5,start,end);
    ctx.fillStyle = i%2 ? "#1e40af" : "#3b82f6";
    ctx.fill();

    ctx.save();
    ctx.rotate(start + segmentAngle/2);
    ctx.translate(r*0.65,0);
    ctx.rotate(Math.PI/2);

    ctx.fillStyle = "white";
    ctx.font = "12px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(wheelItems[i].slice(0,8),0,0);

    ctx.restore();
  }

  ctx.restore();
}

function pickGift(){
  let r = Math.random(), sum=0;
  for(let i=0;i<weights.length;i++){
    sum+=weights[i];
    if(r<=sum) return i;
  }
  return 2;
}

function spin(){
  const giftIndex = pickGift();
  const target = chosenIndexes[giftIndex];

  const targetAngle = target*segmentAngle + segmentAngle/2;
  const pointerAngle = -Math.PI/2;

  let delta = pointerAngle - targetAngle;
  currentRotation += (6*Math.PI*2) + delta;

  canvas.style.transform = `rotate(${currentRotation}rad)`;

  setTimeout(()=>{
    document.getElementById("result").innerText = realGifts[giftIndex];
  },5000);
}
</script>
</body>
</html>
